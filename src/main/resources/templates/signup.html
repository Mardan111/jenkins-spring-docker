<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      lang="en"
      th:replace="~{base::layout(~{::section})}">

<head>
<meta charset="UTF-8">
<title>Join Hidden Leaf</title>
</head>


<body>

<section>


<style>

.signup-page{

min-height:90vh;

display:flex;

align-items:center;

justify-content:center;

position:relative;

overflow:hidden;

background:

linear-gradient(
135deg,
rgba(0,0,0,.85),
rgba(0,80,50,.75)
),

url("https://wallpapercave.com/wp/wp4923989.jpg");

background-size:cover;

background-position:center;

}


/* chakra animation */

.chakra{

position:absolute;

width:35px;
height:35px;

background:#ff9800;

border-radius:50%;

box-shadow:
0 0 20px orange,
0 0 40px red;

animation:chakraMove 8s infinite;

}


.c1{
left:10%;
top:20%;
}


.c2{
right:15%;
top:35%;
animation-delay:2s;
}


.c3{
left:50%;
bottom:10%;
animation-delay:4s;
}



@keyframes chakraMove{

0%{
transform:translateY(0) scale(1);
opacity:.4;
}

50%{
transform:translateY(-120px) scale(1.4);
opacity:1;
}

100%{
transform:translateY(0) scale(1);
opacity:.4;
}

}



/* signup card */


.shinobi-card{


width:700px;

padding:35px;


background:

rgba(10,20,15,.85);


border-radius:25px;


border:

1px solid #ff9800;


box-shadow:

0 0 30px rgba(255,152,0,.7);


backdrop-filter:blur(15px);


animation:

entry 1s ease;


}



@keyframes entry{

from{

opacity:0;

transform:translateY(80px);

}


to{

opacity:1;

transform:translateY(0);

}

}



/* Logo */


.leaf-logo{


width:90px;

height:90px;

margin:auto;


border-radius:50%;


background:

radial-gradient(circle,#ff9800,#b30000);


display:flex;

align-items:center;

justify-content:center;


font-size:45px;


box-shadow:

0 0 35px orange;


animation:

rotateLogo 6s infinite linear;


}



@keyframes rotateLogo{

from{

transform:rotate(0deg);

}

to{

transform:rotate(360deg);

}

}



.title{


text-align:center;

color:#ffb300;

font-size:38px;

font-weight:900;


text-shadow:

0 0 15px orange;


}



.subtitle{

text-align:center;

color:white;

margin-bottom:25px;

}



/* Inputs */


.ninja-input{


background:#07140f!important;


border:

1px solid #ff9800!important;


color:white!important;


border-radius:15px;


padding:12px;


}


.ninja-input:focus{


box-shadow:

0 0 20px orange!important;


}



/* Button */


.fire-button{


width:100%;

padding:15px;


border-radius:30px;


border:none;


font-weight:bold;

font-size:18px;


color:white;


background:

linear-gradient(
45deg,
#ff9800,
#e00000
);


transition:.4s;


}



.fire-button:hover{


transform:scale(1.05);


box-shadow:

0 0 30px orange;


}



/* floating symbols */


.symbol{


position:absolute;

font-size:60px;

color:white;

opacity:.08;


animation:

floatSymbol 10s infinite;


}



.s1{

left:5%;
bottom:20%;

}



.s2{

right:5%;
top:20%;

}



@keyframes floatSymbol{


50%{

transform:translateY(-100px);

}

}



</style>




<div class="signup-page">


<div class="chakra c1"></div>
<div class="chakra c2"></div>
<div class="chakra c3"></div>


<div class="symbol s1">
🍃
</div>


<div class="symbol s2">
🔥
</div>



<div class="shinobi-card">


<div class="leaf-logo">

🍥

</div>


<h1 class="title">

Join The Hidden Leaf

</h1>


<p class="subtitle">

Create your shinobi identity and carry the Will of Fire

</p>



<form th:action="@{/signup}" 
      method="post"
      th:object="${user}">


<div class="row">


<div class="col-md-6 mb-3">


<label class="text-white">
Shinobi Name
</label>


<input 
class="form-control ninja-input"
type="text"
placeholder="Enter ninja name"
th:field="*{userName}"
required>


</div>



<div class="col-md-6 mb-3">


<label class="text-white">
Village Email
</label>


<input
class="form-control ninja-input"
type="email"
placeholder="Enter email"
th:field="*{emailId}"
required>


</div>


</div>




<label class="text-white">
Clan Identity
</label>


<select class="form-control ninja-input mb-3"
th:field="*{gender}">

<option value="">
Select Identity
</option>

<option>
Uchiha
</option>

<option>
Uzumaki
</option>

<option>
Hyuga
</option>

<option>
Nara
</option>

</select>




<div class="row">


<div class="col-md-6">


<label class="text-white">
Communication Scroll
</label>


<input
class="form-control ninja-input"
type="number"
placeholder="Phone number"
th:field="*{phoneNumber}">


</div>



<div class="col-md-6">


<label class="text-white">
Secret Jutsu Password
</label>


<input
class="form-control ninja-input"
type="password"
placeholder="Create password"
th:field="*{password}">


</div>


</div>




<button class="fire-button mt-4">

🔥 Become A Shinobi

</button>



</form>



<div class="text-center mt-4 text-white">


Already part of a clan?


<a href="/login"
style="color:#ff9800">

Enter Village

</a>


</div>



</div>


</div>


</section>

</body>

</html>
