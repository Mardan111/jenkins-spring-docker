<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      lang="en"
      th:replace="~{base::layout(~{::section})}">

<head>
<meta charset="UTF-8">
<title>Hidden Leaf Login</title>
</head>


<body>

<section>


<style>


.login-container{


min-height:90vh;


display:flex;


align-items:center;


justify-content:center;


position:relative;


overflow:hidden;


background:


linear-gradient(

135deg,

rgba(0,0,0,.85),

rgba(90,0,0,.75)

),


url("https://wallpapercave.com/wp/wp4923989.jpg");



background-size:cover;


background-position:center;


padding:40px;


}




/* Chakra particles */


.chakra{


position:absolute;


width:30px;

height:30px;


background:#ff9800;


border-radius:50%;


box-shadow:

0 0 20px orange,

0 0 40px red;


animation:

chakraMove 7s infinite;


}



.c1{

left:15%;

top:20%;

}


.c2{

right:15%;

top:35%;

animation-delay:2s;

}



.c3{

left:50%;

bottom:10%;

animation-delay:4s;

}



@keyframes chakraMove{


0%{

transform:translateY(0);

opacity:.3;

}



50%{

transform:translateY(-120px);

opacity:1;

}



100%{

transform:translateY(0);

opacity:.3;

}


}





/* Login card */


.login-card{


width:430px;


padding:40px;


background:


rgba(10,10,10,.85);



border-radius:25px;



border:

1px solid orange;



box-shadow:


0 0 40px rgba(255,80,0,.8);



backdrop-filter:blur(12px);



animation:

cardEntry 1s ease;


}




@keyframes cardEntry{


from{

opacity:0;

transform:translateY(70px);

}


to{

opacity:1;

transform:translateY(0);

}


}





/* Naruto icon */


.ninja-logo{


width:100px;


height:100px;


margin:auto;


display:flex;


align-items:center;


justify-content:center;



font-size:55px;



border-radius:50%;



background:


radial-gradient(

circle,

#ff9800,

#b30000

);



box-shadow:


0 0 30px orange;



animation:

rotateLogo 6s infinite linear;



}



@keyframes rotateLogo{


100%{

transform:rotate(360deg);

}


}




.title{


color:#ffb300;


text-align:center;


font-size:38px;


font-weight:900;



text-shadow:


0 0 15px orange;


}




.subtitle{


text-align:center;


color:white;


margin-bottom:30px;


}




label{


color:white;


font-weight:600;


}




.ninja-input{


background:#080808!important;


border:

1px solid orange!important;


color:white!important;


border-radius:15px;


padding:13px;


}



.ninja-input:focus{


box-shadow:


0 0 20px orange!important;


}




.fire-button{


width:100%;


padding:15px;


border:none;


border-radius:30px;



background:


linear-gradient(

45deg,

orange,

red

);



color:white;


font-weight:bold;


font-size:18px;


transition:.3s;


}



.fire-button:hover{


transform:scale(1.05);


box-shadow:


0 0 30px orange;


}




.link-style{


color:#ffb300;


text-decoration:none;


font-weight:bold;


}



.link-style:hover{


color:red;


}




</style>





<div class="login-container">



<div class="chakra c1"></div>

<div class="chakra c2"></div>

<div class="chakra c3"></div>





<div class="login-card">



<div class="ninja-logo">

🍥

</div>




<h1 class="title">

Will of Fire

</h1>



<p class="subtitle">

Enter the Hidden Leaf Village

</p>





<form th:action="@{/login}" method="post">





<div class="mb-3">


<label for="userName">

Shinobi Name

</label>



<input

class="form-control ninja-input"

type="text"

id="userName"

name="userName"

placeholder="Enter username"

required>


</div>






<div class="mb-3">


<label for="password">

Secret Jutsu Password

</label>



<input

class="form-control ninja-input"

type="password"

id="password"

name="password"

placeholder="Enter password"

required>


</div>





<button type="submit"

class="fire-button">


🔥 Enter Village


</button>



</form>






<div class="text-center mt-4 text-white">


<a href="#"

class="link-style">

Forgot Password?

</a>


<br><br>


New shinobi?


<a href="/signup"

class="link-style">

Create Clan Account

</a>


</div>





<div th:if="${error}"

class="text-danger text-center mt-3"

th:text="${error}">


</div>





</div>


</div>


</section>


</body>

</html>
