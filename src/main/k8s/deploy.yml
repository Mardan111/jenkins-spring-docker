---
apiVersion: v1
kind: Namespace
metadata:
  name: prod

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spring-app
  namespace: prod

spec:
  replicas: 2

  selector:
    matchLabels:
      app: web

  template:
    metadata:
      labels:
        app: web

    spec:
      containers:
      - name: spring-app
        image: mardan112/myanime:latest
        imagePullPolicy: Always

        ports:
        - containerPort: 8080

---
apiVersion: v1
kind: Service

metadata:
  name: spring-service
  namespace: prod

spec:
  type: NodePort

  selector:
    app: web

  ports:
  - port: 80
    targetPort: 8080
    nodePort: 30082
