apiVersion: v1
kind: PersistentVolumeClaim

metadata:
  name: mysql-pvc
  namespace: prod

spec:

  accessModes:

  - ReadWriteOnce


  resources:

    requests:

      storage: 5Gi


---
apiVersion: v1
kind: Service

metadata:

  name: mysql

  namespace: prod


spec:

  type: ClusterIP


  selector:

    app: mysql


  ports:

  - port: 3306

    targetPort: 3306


---
apiVersion: apps/v1
kind: StatefulSet

metadata:

  name: mysql

  namespace: prod


spec:

  serviceName: mysql

  replicas: 1


  selector:

    matchLabels:

      app: mysql


  template:

    metadata:

      labels:

        app: mysql


    spec:

      containers:

      - name: mysql

        image: mysql:8.0


        ports:

        - containerPort: 3306


        env:


        - name: MYSQL_ROOT_PASSWORD

          valueFrom:

            secretKeyRef:

              name: mysql-secret

              key: MYSQL_ROOT_PASSWORD


        - name: MYSQL_DATABASE

          valueFrom:

            secretKeyRef:

              name: mysql-secret

              key: MYSQL_DATABASE



        volumeMounts:

        - name: mysql-storage

          mountPath: /var/lib/mysql



      volumes:

      - name: mysql-storage

        persistentVolumeClaim:

          claimName: mysql-pvc